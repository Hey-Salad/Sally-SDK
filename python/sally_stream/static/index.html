<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>iPhone Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: -apple-system, monospace;
    color: #eee;
    padding: 12px;
    gap: 10px;
  }

  #statusbar {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: #888;
    width: 375px;
    max-width: 100%;
  }
  #statusbar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  #statusbar .dot.green  { background: #22c55e; }
  #statusbar .dot.yellow { background: #eab308; }
  #statusbar .dot.red    { background: #ef4444; }

  #phone-wrap {
    position: relative;
    width: 375px;
    max-width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 0 2px #333, 0 8px 40px rgba(0,0,0,0.8);
    touch-action: none;
    user-select: none;
  }

  #screen {
    display: block;
    width: 100%;
    height: auto;
    background: #000;
    cursor: crosshair;
  }

  #fps-overlay {
    position: absolute;
    top: 6px; right: 8px;
    background: rgba(0,0,0,0.55);
    color: #0f0;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
  }

  .ripple {
    position: absolute;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 50%;
    width: 30px; height: 30px;
    margin: -15px 0 0 -15px;
    animation: rippleAnim 0.4s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    from { transform: scale(0.2); opacity: 1; }
    to   { transform: scale(2);   opacity: 0; }
  }

  #buttons {
    display: flex;
    gap: 8px;
    width: 375px;
    max-width: 100%;
  }
  button {
    flex: 1;
    padding: 10px 4px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1e1e1e;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  button:active { background: #333; }
  button.wda-btn { border-color: #1d4ed8; color: #93c5fd; }
  button.wda-btn:disabled { opacity: 0.35; cursor: default; }

  #wda-status {
    font-size: 11px;
    color: #555;
    width: 375px;
    max-width: 100%;
    text-align: center;
  }
  #wda-status.active { color: #22c55e; }

  #connecting-msg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #555;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div id="statusbar">
  <div class="dot" id="ws-dot"></div>
  <span id="ws-label">Connecting...</span>
  <span style="margin-left:auto" id="res-label"></span>
</div>

<div id="phone-wrap">
  <canvas id="screen" width="375" height="812"></canvas>
  <div id="fps-overlay">-- fps</div>
  <div id="connecting-msg">Connecting to iPhone...</div>
</div>

<div id="buttons">
  <button class="wda-btn" id="btn-home" onclick="pressButton('home')" disabled>⊙ Home</button>
  <button class="wda-btn" id="btn-lock" onclick="pressButton('lock')" disabled>🔒 Lock</button>
  <button class="wda-btn" id="btn-volup" onclick="pressButton('volumeup')" disabled>🔊 Vol+</button>
  <button class="wda-btn" id="btn-voldn" onclick="pressButton('volumedown')" disabled>🔉 Vol−</button>
</div>

<div id="wda-status">Touch injection: checking...</div>

<script>
const IPHONE_W = 375, IPHONE_H = 812;
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const WS_URL = `${proto}://${location.host}/ws`;

const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const fpsEl = document.getElementById('fps-overlay');
const wsDot = document.getElementById('ws-dot');
const wsLabel = document.getElementById('ws-label');
const resLabel = document.getElementById('res-label');
const connecting = document.getElementById('connecting-msg');
const wdaStatus = document.getElementById('wda-status');
const wdaBtns = document.querySelectorAll('.wda-btn');

let ws, reconnectTimer;
let frameTs = [], wdaAvailable = false;
let touchStart = null, touchStartTime = 0;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'blob';

  ws.onopen = () => {
    wsDot.className = 'dot green';
    wsLabel.textContent = 'Connected';
    setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 5000);
    checkStatus();
  };

  ws.onmessage = async (ev) => {
    const blob = ev.data;
    const bitmap = await createImageBitmap(blob);
    ctx.drawImage(bitmap, 0, 0, IPHONE_W, IPHONE_H);
    bitmap.close();
    connecting.style.display = 'none';

    const now = performance.now();
    frameTs.push(now);
    frameTs = frameTs.filter(t => now - t < 1000);
    fpsEl.textContent = `${frameTs.length} fps`;

    if (bitmap.width && bitmap.height) {
      const aspect = bitmap.height / bitmap.width;
      canvas.height = Math.round(IPHONE_W * aspect);
      resLabel.textContent = `${bitmap.width}×${bitmap.height}`;
    }
  };

  ws.onclose = () => {
    wsDot.className = 'dot red';
    wsLabel.textContent = 'Disconnected — reconnecting...';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

async function checkStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    wdaAvailable = d.wda;
    if (wdaAvailable) {
      wdaStatus.textContent = 'Touch injection: active ✓';
      wdaStatus.className = 'active';
      wdaBtns.forEach(b => b.disabled = false);
    } else {
      wdaStatus.textContent = 'Touch injection: WDA not installed (view-only)';
    }
  } catch {}
  setTimeout(checkStatus, 5000);
}

function canvasCoords(ev) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = IPHONE_W / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = ev.touches ? ev.touches[0] : ev;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

function showRipple(x, y) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / IPHONE_W;
  const scaleY = rect.height / canvas.height;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = `${x * scaleX}px`;
  r.style.top = `${y * scaleY}px`;
  document.getElementById('phone-wrap').appendChild(r);
  setTimeout(() => r.remove(), 450);
}

async function sendTouch(payload) {
  if (!wdaAvailable) return;
  await fetch('/touch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  });
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const c = canvasCoords(e);
  touchStart = c;
  touchStartTime = Date.now();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart) return;
  const c = canvasCoords({ touches: e.changedTouches });
  const dx = c.x - touchStart.x, dy = c.y - touchStart.y;
  const dist = Math.hypot(dx, dy);
  const dt = Date.now() - touchStartTime;

  if (dist < 8 && dt < 350) {
    showRipple(touchStart.x, touchStart.y);
    sendTouch({ type: 'tap', x: touchStart.x, y: touchStart.y });
  } else {
    sendTouch({ type: 'swipe', x: touchStart.x, y: touchStart.y, x2: c.x, y2: c.y, duration: Math.min(dt, 1000) });
  }
  touchStart = null;
}, { passive: false });

let mouseDown = false;
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  touchStart = canvasCoords(e);
  touchStartTime = Date.now();
});
canvas.addEventListener('mouseup', e => {
  if (!mouseDown || !touchStart) return;
  mouseDown = false;
  const c = canvasCoords(e);
  const dist = Math.hypot(c.x - touchStart.x, c.y - touchStart.y);
  const dt = Date.now() - touchStartTime;
  if (dist < 8 && dt < 350) {
    showRipple(touchStart.x, touchStart.y);
    sendTouch({ type: 'tap', x: touchStart.x, y: touchStart.y });
  } else {
    sendTouch({ type: 'swipe', x: touchStart.x, y: touchStart.y, x2: c.x, y2: c.y, duration: Math.min(dt, 1000) });
  }
  touchStart = null;
});

async function pressButton(name) {
  await fetch('/button', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name }),
  });
}

connect();
</script>
</body>
</html>
